<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basic English Grammar Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section id="menu-screen" class="screen active" aria-labelledby="app-title">
      <div class="topline">English Grammar Practice</div>
      <h1 id="app-title">Basic English Grammar Game</h1>

      <div class="lesson-list">
        <div class="coach-card" aria-label="Grammar coach">
          <img src="assets/grammar-coach.svg" alt="">
          <div>
            <span>Coach</span>
            <strong id="menu-coach-line">今日由句子分析開始。</strong>
          </div>
        </div>

        <div class="practice-control">
          <label class="slider-label" for="practice-count">
            <span>練習題數</span>
            <output id="practice-count-output" for="practice-count">20 題</output>
          </label>
          <input id="practice-count" type="range" min="10" max="100" step="5" value="20">
        </div>

        <button class="lesson-card" type="button" data-start-lesson="lesson1">
          <span class="lesson-kicker">Lesson 01</span>
          <strong>分辨句子是否有動作動詞</strong>
          <span class="lesson-meta">
            <span>分辨句子何時要 is/am/are</span>
            <span id="menu-progress-lesson1">0/100</span>
          </span>
        </button>

        <button class="lesson-card" type="button" data-start-lesson="lesson2">
          <span class="lesson-kicker">Lesson 02</span>
          <strong>一句句子必須只有一個動詞</strong>
          <span class="lesson-meta">
            <span>分辨正確句、沒有動詞、兩個動詞</span>
            <span id="menu-progress-lesson2">0/100</span>
          </span>
        </button>
      </div>
    </section>

    <section id="lesson-screen" class="screen" aria-labelledby="lesson-title">
      <header class="lesson-header">
        <button class="ghost-btn" type="button" data-back-menu>&lt; Menu</button>
        <div>
          <div id="lesson-kicker" class="topline">Lesson 01</div>
          <h2 id="lesson-title">分辨句子是否有動作動詞</h2>
        </div>
        <div class="header-tools">
          <button id="sound-toggle" class="sound-btn" type="button" aria-label="關閉音效" aria-pressed="true">♪</button>
          <div class="counter">Q <span id="question-number">1</span>/<span id="question-total">100</span></div>
        </div>
      </header>

      <div id="lesson-scroll" class="lesson-scroll">
        <div class="status-strip">
          <div>
            <span>First try</span>
            <strong><span id="live-score">0</span>/<span id="live-total">0</span></strong>
          </div>
          <div>
            <span>Streak</span>
            <strong id="live-streak">0</strong>
          </div>
          <div>
            <span>Best</span>
            <strong id="best-streak">0</strong>
          </div>
        </div>

        <div class="prompt-panel">
          <div id="step-label" class="step-label">中文句子</div>
          <div id="category-pill" class="category-pill">--</div>
          <div id="chinese-prompt" class="chinese-prompt">--</div>
          <div id="guidance" class="guidance">分析句子有沒有動作動詞</div>
        </div>

        <div id="rule-card" class="rule-card hidden">
          <strong>動詞要訣</strong>
          <span>現在式 / 過去式先算動詞；PP / ING 不當動詞。</span>
          <span>is / am / are 是動詞；有其他動詞時不要再加 be。</span>
        </div>

        <div id="verb-choice" class="choice-grid symbol-grid">
          <button class="symbol-btn tick" type="button" data-verb-choice="true" aria-label="有動詞">✓</button>
          <button class="symbol-btn cross" type="button" data-verb-choice="false" aria-label="冇動詞">×</button>
        </div>

        <div id="be-need-choice" class="choice-grid hidden">
          <button class="option-btn" type="button" data-needs-be="true">要用 is / am / are</button>
          <button class="option-btn" type="button" data-needs-be="false">不用 is / am / are</button>
        </div>

        <div id="be-form-choice" class="choice-grid be-grid hidden">
          <button class="option-btn" type="button" data-be-form="is">is</button>
          <button class="option-btn" type="button" data-be-form="am">am</button>
          <button class="option-btn" type="button" data-be-form="are">are</button>
        </div>

        <div id="judgment-choice" class="choice-grid symbol-grid hidden">
          <button class="symbol-btn tick" type="button" data-sentence-judgment="correct" aria-label="正確">✓</button>
          <button class="symbol-btn cross" type="button" data-sentence-judgment="wrong" aria-label="錯誤">×</button>
        </div>

        <div id="verb-count-choice" class="choice-grid count-grid hidden">
          <button class="option-btn" type="button" data-verb-count="0">0</button>
          <button class="option-btn" type="button" data-verb-count="1">1</button>
          <button class="option-btn" type="button" data-verb-count="2">2</button>
        </div>

        <div id="verb-token-choice" class="verb-token-choice hidden">
          <div id="verb-token-grid" class="token-grid"></div>
          <button id="submit-verbs-btn" class="primary-btn" type="button">確認動詞</button>
        </div>

        <button id="english-card" class="english-card hidden" type="button">
          <span>English sentence</span>
          <strong id="english-text">--</strong>
          <small>Click to read</small>
        </button>

        <div id="feedback" class="feedback" aria-live="polite"></div>
      </div>

      <footer class="lesson-actions">
        <button id="next-btn" class="primary-btn hidden" type="button">下一題</button>
        <button id="restart-btn" class="primary-btn hidden" type="button">Restart</button>
      </footer>
    </section>

    <section id="result-screen" class="screen" aria-labelledby="result-title">
      <div id="result-kicker" class="topline">Lesson 01 Result</div>
      <h2 id="result-title">練習完成</h2>

      <div class="result-panel">
        <div class="result-score">
          <span id="result-score">0/20</span>
          <small>First try</small>
        </div>
        <div class="result-grid">
          <div>
            <span id="result-total">20</span>
            <small>題數</small>
          </div>
          <div>
            <span id="result-mistakes">0</span>
            <small>錯誤次數</small>
          </div>
          <div>
            <span id="result-percent">100%</span>
            <small>準確率</small>
          </div>
        </div>
        <p id="result-message" class="result-message">做得好！</p>
        <div id="review-summary" class="review-summary hidden"></div>
      </div>

      <footer class="lesson-actions">
        <button class="ghost-btn" type="button" data-result-menu>Menu</button>
        <button id="review-mistakes-btn" class="primary-btn hidden" type="button" data-review-mistakes>重練錯題</button>
        <button class="primary-btn" type="button" data-restart-lesson>Restart</button>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
