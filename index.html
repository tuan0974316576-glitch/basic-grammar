<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basic English Grammar Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section id="menu-screen" class="screen active" aria-labelledby="app-title">
      <div class="topline">English Grammar Practice</div>
      <h1 id="app-title">🎌 Basic English<br>Grammar Game 🎌</h1>
      <p class="subtitle">日系貼紙風 grammar 小遊戲：先睇中文，再判斷英文句子要點砌。</p>

      <div class="lesson-list">
        <button class="lesson-card" type="button" data-start-lesson>
          <span class="lesson-kicker">Lesson 01</span>
          <strong>分辨句子是否有動詞</strong>
          <span class="lesson-meta">
            <span>25 動詞 + 15「是」+ 10 形容詞</span>
            <span id="menu-progress">0/50</span>
          </span>
        </button>
      </div>
    </section>

    <section id="lesson-screen" class="screen" aria-labelledby="lesson-title">
      <header class="lesson-header">
        <button class="ghost-btn" type="button" data-back-menu>&lt; Menu</button>
        <div>
          <div class="topline">Lesson 01</div>
          <h2 id="lesson-title">分辨句子是否有動詞</h2>
        </div>
        <div class="counter">Q <span id="question-number">1</span>/<span id="question-total">50</span></div>
      </header>

      <div class="prompt-panel">
        <div id="step-label" class="step-label">中文句子</div>
        <div id="category-pill" class="category-pill">--</div>
        <div id="chinese-prompt" class="chinese-prompt">--</div>
        <div id="guidance" class="guidance">分析句子有沒有動詞</div>
      </div>

      <div id="verb-choice" class="choice-grid symbol-grid">
        <button class="symbol-btn tick" type="button" data-verb-choice="true" aria-label="有動詞">✓</button>
        <button class="symbol-btn cross" type="button" data-verb-choice="false" aria-label="冇動詞">×</button>
      </div>

      <div id="be-need-choice" class="choice-grid hidden">
        <button class="option-btn" type="button" data-needs-be="true">要用 is / am / are</button>
        <button class="option-btn" type="button" data-needs-be="false">不用 is / am / are</button>
      </div>

      <div id="be-form-choice" class="choice-grid be-grid hidden">
        <button class="option-btn" type="button" data-be-form="is">is</button>
        <button class="option-btn" type="button" data-be-form="am">am</button>
        <button class="option-btn" type="button" data-be-form="are">are</button>
      </div>

      <button id="english-card" class="english-card hidden" type="button">
        <span>English sentence</span>
        <strong id="english-text">--</strong>
        <small>Click to read</small>
      </button>

      <div id="feedback" class="feedback" aria-live="polite"></div>

      <footer class="lesson-actions">
        <button id="next-btn" class="primary-btn hidden" type="button">Next</button>
        <button id="restart-btn" class="primary-btn hidden" type="button">Restart</button>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
